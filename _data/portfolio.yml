- id: ecommerce
  icon: ti-shopping-cart
  color: blue
  en:
    title: E-commerce Platform
    tags: [Ruby on Rails, MySQL, Redis, Sidekiq]
    desc: A multi-vendor online store with a product catalog of 50,000+ items, order management, payment gateway integrations, and an admin panel for content management. Includes automated email notifications and a loyalty system.
  ua:
    title: E-commerce платформа
    tags: [Ruby on Rails, MySQL, Redis, Sidekiq]
    desc: Багатовендорний інтернет-магазин з каталогом понад 50 000 товарів, управлінням замовленнями, інтеграцією платіжних систем та адмін-панеллю. Автоматичні email-сповіщення та система лояльності.
  de:
    title: E-Commerce-Plattform
    tags: [Ruby on Rails, MySQL, Redis, Sidekiq]
    desc: Ein Multi-Vendor-Onlineshop mit über 50.000 Produkten, Auftragsverwaltung, Zahlungsintegration und Admin-Panel. Automatisierte E-Mail-Benachrichtigungen und ein Treueprogramm.
  ru:
    title: E-commerce платформа
    tags: [Ruby on Rails, MySQL, Redis, Sidekiq]
    desc: Мультивендорный интернет-магазин с каталогом более 50 000 товаров, управлением заказами, интеграцией платёжных систем и админ-панелью. Автоматические email-уведомления и система лояльности.

- id: vending
  icon: ti-droplet
  color: teal
  en:
    title: Vending Machine Software
    tags: [Ruby, IoT, REST API, PostgreSQL]
    desc: Custom software for a network of drinking water vending machines. Real-time monitoring, remote management, sales analytics, and automated maintenance alerts. Integration with payment terminals and mobile app for end users.
  ua:
    title: ПЗ для вендингових автоматів
    tags: [Ruby, IoT, REST API, PostgreSQL]
    desc: Програмне забезпечення для мережі вендингових автоматів з питною водою. Моніторинг в реальному часі, дистанційне управління, аналітика продажів та сповіщення про обслуговування. Інтеграція з платіжними терміналами і мобільним додатком.
  de:
    title: Vending-Automaten-Software
    tags: [Ruby, IoT, REST API, PostgreSQL]
    desc: Individuelle Software für ein Netzwerk von Trinkwasser-Automaten. Echtzeit-Monitoring, Fernsteuerung, Verkaufsanalyse und automatische Wartungsmeldungen. Integration mit Zahlungsterminals und mobiler App.
  ru:
    title: ПО для вендинговых автоматов
    tags: [Ruby, IoT, REST API, PostgreSQL]
    desc: Программное обеспечение для сети вендинговых автоматов с питьевой водой. Мониторинг в реальном времени, удалённое управление, аналитика продаж и уведомления об обслуживании. Интеграция с платёжными терминалами и мобильным приложением.

