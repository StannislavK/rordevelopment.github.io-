        title: Website Creation
        desc: Landing pages, corporate websites, e-commerce. Clean code, no unnecessary plugins.
      - icon: ti-chart-arrows
        title: Project Management
        desc: Managing development of websites and web applications from brief to launch.
      - icon: ti-server
        title: Server Management
        desc: Setup, migration and maintenance of infrastructure of any complexity.
      - icon: ti-brush
        title: UI/UX Design
        desc: Interface design by verified specialists hired per project.
      - icon: ti-users
        title: IT HR & Outstaffing
        desc: Providing developers from our pool for your team. Developer screening for partners.
