        title: PHP Development
        desc: Laravel, Yii2 and other frameworks. API, integrations, complex business logic.
      - icon: ti-device-mobile
        title: Mobile & Web Apps
        desc: Full-cycle development of web applications and mobile solutions.
      - icon: ti-building
        title: CRM & ERP Systems
        desc: Custom business automation systems tailored to your processes.
